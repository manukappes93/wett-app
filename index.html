<script>
/* ============================
   GRUNDVARIABLEN
============================ */
let currentEntries = [];
let isTimePickerOpen = false;
let countryStatsDetailed = {};
let loadedDay = null;


const output = document.getElementById("output");
const baseStakeInput = document.getElementById("baseStake");
const loadOverlay = document.getElementById("loadOverlay");
const deleteOverlay = document.getElementById("deleteOverlay");
const statsOverlay = document.getElementById("statsOverlay");

function today() {
  return new Date().toISOString().split("T")[0];
}

/* ============================
   GRUNDEINSATZ LADEN (RTDB)
============================ */
async function loadBaseStake() {
  const snap = await rtdb.ref("settings/baseStake").once("value");
  if (snap.exists()) baseStakeInput.value = snap.val();
}
loadBaseStake();

/* Grundeinsatz speichern */
baseStakeInput.oninput = async () => {
  await rtdb.ref("settings/baseStake").set(baseStakeInput.value);
   // WICHTIG: Nur rendern, wenn NICHT gerade eine Uhrzeit eingegeben wird
  if (!isTimePickerOpen) {
    renderEntries();
    }
};

/* ============================
   SORTIERUNG & COUNTDOWN
============================ */
function sortEntries() {
  // Normale Sortierung nach Uhrzeit
  currentEntries.sort((a, b) => (a.time || "") > (b.time || "") ? 1 : -1);

  // ⭐ Zusatztipps immer nach unten sortieren
  currentEntries = [
    ...currentEntries.filter(e => e.country !== "Zusatztipp"),
    ...currentEntries.filter(e => e.country === "Zusatztipp")
  ];
}


function updateCountdowns() {
  if (isTimePickerOpen) return;

  const now = new Date();

  const loadedDate = loadedDay ? new Date(loadedDay + "T00:00:00") : null;
  const todayDate = new Date(today() + "T00:00:00");

  currentEntries.forEach((entry, index) => {
    const cd = document.getElementById("countdown-" + index);
    if (!cd) return;

    // Erstmal alle Klassen entfernen
    cd.classList.remove("countdown-warning", "countdown-running", "countdown-finished", "countdown-blink");

    if (!entry.time) {
      cd.textContent = "Keine Uhrzeit gesetzt";
      return;
    }

    const target = new Date(loadedDay + "T" + entry.time + ":00");

    // Vergangener Tag → sofort beendet
    if (loadedDate < todayDate) {
      cd.textContent = "Beendet";
      cd.classList.add("countdown-finished");
      return;
    }

    let diff = target - now;

    if (diff > 0) {
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);

      cd.textContent = `Start in ${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;

      // ⭐ Unter 15 Minuten → rot
      if (diff < 15 * 60 * 1000) {
        cd.classList.add("countdown-warning");
      }

      // ⭐ Unter 5 Minuten → blinkend
      if (diff < 5 * 60 * 1000) {
        cd.classList.add("countdown-blink");
      }

    } else {
      diff = Math.abs(diff);
      const minutes = Math.floor(diff / 60000);

      if (minutes < 110) {
        cd.textContent = "im Gange";
        cd.classList.add("countdown-running");
      } else {
        cd.textContent = "Beendet";
        cd.classList.add("countdown-finished");
      }
    }
  });
}

/* ============================
   TAGESBILANZ
============================ */
function updateDayTotal() {
  const stake = parseFloat(baseStakeInput.value || 0);
  let total = 0;

  currentEntries.forEach(entry => {
    entry.tips
      .filter(tip => tip.favorite)   // ⭐ nur Favoriten
      .forEach(tip => {
        const quote = parseFloat(tip.quote || 0);

        if (tip.color === "correct") {
          total += (quote * stake) - stake;
        } else if (tip.color === "wrong") {
          total -= stake;
        }
      });
  });

  const box = document.getElementById("dayTotalBox");
  box.textContent = total.toFixed(2) + " €";
  box.style.backgroundColor =
    total > 0 ? "#c8ffcc" : total < 0 ? "#ffcccc" : "#dddddd";
}

async function loadAllSavedDays() {
const snapshot = await rtdb.ref("days").get();
  return snapshot.val() || {};
}

async function calculateGlobalCountryStats() {
  const snapshot = await rtdb.ref("days").get();
  const days = snapshot.val() || {};

  const stats = {};

  for (const date in days) {
    const dayData = days[date];

    // WICHTIG: Deine Tipps liegen unter "entries"
    const entries = Object.values(dayData.entries || {});

    entries.forEach(entry => {
      if (!entry || !entry.tips) return;

      const country = entry.country || "Unbekannt";

      if (!stats[country]) stats[country] = {};

      entry.tips.forEach(tip => {
        if (!tip) return;

        const type = getTipType(tip);
        const quote = parseFloat(tip.quote || 0);
        const stake = parseFloat(baseStakeInput.value || 0);

        if (!stats[country][type]) {
          stats[country][type] = {
            correct: 0,
            wrong: 0,
            neutral: 0,
            reset: 0,
            profit: 0
          };
        }

        if (tip.color === "correct") {
          stats[country][type].correct++;
          stats[country][type].profit += (quote * stake) - stake;
        } else if (tip.color === "wrong") {
          stats[country][type].wrong++;
          stats[country][type].profit -= stake;
        } else if (tip.color === "neutral") {
          stats[country][type].neutral++;
        } else {
          stats[country][type].reset++;
        }
      });
    });
  }

  return stats;
}


/* ============================
   Gesamtbilanz
============================ */
function renderCountryStats(data) {
  const container = document.getElementById("countryStatsContent");
  container.innerHTML = "";

  for (const country in data) {
    const countryBox = document.createElement("div");
    countryBox.className = "country-box";

    let html = `<h3>${country}</h3>`;

   for (const type in data[country]) {
  const t = data[country][type];

  const profitClass = t.profit >= 0 ? "profit-positive" : "profit-negative";

  html += `
    <div class="tip-type-box">
      <strong>${type}</strong><br>
      ✔️ ${t.correct}
      ❌ ${t.wrong}
      ➖ ${t.neutral}
      ⭯ ${t.reset}<br>
      <strong class="${profitClass}">
        Profit: ${t.profit.toFixed(2)} €
      </strong>
    </div>
  `;
    }

    countryBox.innerHTML = html;
    container.appendChild(countryBox);
  }
}


/* ============================
   STATISTIK
============================ */
function updateStats() {
  let correct = 0, wrong = 0, neutral = 0, reset = 0;

  currentEntries.forEach(entry => {
    entry.tips
      .filter(tip => tip.favorite)   // ⭐ nur Favoriten
      .forEach(tip => {
        if (tip.color === "correct") correct++;
        else if (tip.color === "wrong") wrong++;
        else if (tip.color === "neutral") neutral++;
        else reset++;
      });
  });

  document.getElementById("statCorrect").textContent = "✔️ Richtig: " + correct;
  document.getElementById("statWrong").textContent = "❌ Falsch: " + wrong;
  document.getElementById("statNeutral").textContent = "➖ Neutral: " + neutral;
  document.getElementById("statReset").textContent = "⭯ Reset: " + reset;
}

/* ============================
   Hilfsfunktion für Tipp‑Art 
============================ */
function getTipType(tip) {
  if (tip.label.includes("HT")) return "HT";
  if (tip.label.includes("FT")) return "FT";
  if (tip.label.includes("Beide Teams")) return "BTTS";
  if (tip.label.includes("Genaues Ergebnis")) return "CorrectScore";
  return "Other";
}

/* ============================
   EINTRÄGE RENDERN
============================ */
function renderEntries() {
  sortEntries();
  output.innerHTML = "";

  currentEntries.forEach((entry, ei) => {
    const div = document.createElement("div");
    div.className = "entry";

    // ⭐ Länderblock einfärben nach Tages-Profit
if (entry.blockProfit > 0) {
  div.style.border = "3px solid #4CAF50";
  div.style.backgroundColor = "#e8ffe8";
} else if (entry.blockProfit < 0) {
  div.style.border = "3px solid #F44336";
  div.style.backgroundColor = "#ffe5e5";
} else {
  div.style.border = "1px solid #ccc";
  div.style.backgroundColor = "white";
}

    const totalBox = document.createElement("div");
    totalBox.style.cssText = "float:right; padding:6px 10px; border-radius:6px; background:#ddd; font-weight:bold;";
    totalBox.textContent = "0.00 €";
    div.appendChild(totalBox);

   const timeInput = document.createElement("input");
timeInput.type = "time";
timeInput.className = "time-input";
timeInput.value = entry.time || "";

// Countdown pausieren, sobald das Feld geöffnet wird
timeInput.addEventListener("focus", () => {
  isTimePickerOpen = true;
});

// Während der Eingabe KEIN Re-Render
timeInput.addEventListener("input", () => {
  isTimePickerOpen = true;
});

// Erst wenn das Feld verlassen wird → übernehmen + rendern
timeInput.addEventListener("blur", () => {
  const v = timeInput.value;

  if (v && v.length === 5) {
    entry.time = v;
  }

  isTimePickerOpen = false;
  sortEntries();
  renderEntries();
});

    div.appendChild(timeInput);

    const cd = document.createElement("div");
    cd.className = "countdown";
    cd.id = "countdown-" + ei;
    cd.textContent = "–";
    div.appendChild(cd);

const h2 = document.createElement("h2");
h2.innerHTML = `
  <span class="country-text">${entry.country || ""}</span>
  <span class="edit-country" data-id="${ei}">✏️</span>
  <span class="info-country" data-id="${ei}">ℹ️</span>
`;
div.appendChild(h2);

// Info-Icon Event
h2.querySelector(".info-country").onclick = () => {
  const country = entry.country;
  const statsForCountry = countryStatsDetailed[country];

  document.getElementById("countryInfoTitle").textContent =
    `Bilanz für ${country}`;

  const list = document.getElementById("countryInfoList");
  list.innerHTML = "";

  if (!statsForCountry) {
    list.innerHTML = "<p>Keine Daten vorhanden.</p>";
  } else {
    Object.keys(statsForCountry).forEach(tipType => {
      const s = statsForCountry[tipType];

      const div = document.createElement("div");
      div.style.marginBottom = "12px";
      div.style.padding = "10px";
      div.style.border = "1px solid #ccc";
      div.style.borderRadius = "6px";
      div.style.background = "#f9f9f9";

      div.innerHTML = `
        <strong>${tipType}</strong><br>
        ✔️ Richtig: ${s.correct}<br>
        ❌ Falsch: ${s.wrong}<br>
        ➖ Neutral: ${s.neutral}<br>
        💰 Profit: <span class="${s.profit >= 0 ? "profit-positive" : "profit-negative"}">
        ${s.profit.toFixed(2)} €
</span>
      `;

      list.appendChild(div);
    });
  }

  document.getElementById("countryInfoOverlay").style.display = "flex";
};


    const p = document.createElement("p");
    p.innerHTML = "<strong>Spielpaarung:</strong> " + (entry.match || "");
    div.appendChild(p);

    // ⭐ Zusatztipp erkennen + Buttons einfügen
if (entry.country === "Zusatztipp") {

  // Optische Hervorhebung
  div.style.borderLeft = "4px solid orange";
  div.style.background = "rgba(255, 230, 150, 0.3)";

  // Löschen-Button
  const delBtn = document.createElement("button");
  delBtn.textContent = "Löschen";
  delBtn.className = "delete-extra-btn";
  delBtn.onclick = () => deleteExtraTip(entry, ei);
  div.appendChild(delBtn);

  // Bearbeiten-Button
  const editBtn = document.createElement("button");
  editBtn.textContent = "Bearbeiten";
  editBtn.className = "edit-extra-btn";
  editBtn.onclick = () => editExtraTip(entry, ei);
  div.appendChild(editBtn);
}

function updateTotal() {
  const stake = parseFloat(baseStakeInput.value || 0);
  let total = 0;

  // ⭐ Nur Favoriten auswerten
  entry.tips
    .filter(tip => tip.favorite)
    .forEach(tip => {
      const quote = parseFloat(tip.quote || 0);

      if (tip.color === "correct") {
        total += (quote * stake) - stake;
      } else if (tip.color === "wrong") {
        total -= stake;
      }
    });

   // ⭐ Profit speichern
  entry.blockProfit = total;

  totalBox.textContent = total.toFixed(2) + " €";
  totalBox.style.backgroundColor =
    total > 0 ? "#c8ffcc" : total < 0 ? "#ffcccc" : "#ddd";
}

entry.tips.forEach((tip, ti) => {
  const row = document.createElement("div");
  row.className = "tip-row";
  row.dataset.entryIndex = ei;
  row.dataset.tipIndex = ti;

  // ⭐ Favoriten wiederherstellen
if (tip.favorite) {
  row.classList.add("tip-favorite");
}

  // ⭐ gespeicherte Bewertung wiederherstellen
  if (tip.color === "correct") {
    row.classList.add("tip-correct");
  }
  if (tip.color === "wrong") {

============================ */
async function updateCountryStatsDetailed() {
  const stake = parseFloat(baseStakeInput.value || 0);

  const stats = {};

  currentEntries.forEach(entry => {
    const country = entry.country || "Unbekannt";

    if (!stats[country]) stats[country] = {};

    entry.tips.forEach(tip => {
      const type = getTipType(tip);
      const quote = parseFloat(tip.quote || 0);

      if (!stats[country][type]) {
        stats[country][type] = {
          correct: 0,
          wrong: 0,
          neutral: 0,
          reset: 0,
          profit: 0
        };
      }

      if (tip.color === "correct") {
        stats[country][type].correct++;
        stats[country][type].profit += (quote * stake) - stake;
      } else if (tip.color === "wrong") {
        stats[country][type].wrong++;
        stats[country][type].profit -= stake;
      } else if (tip.color === "neutral") {
        stats[country][type].neutral++;
      } else {
        stats[country][type].reset++;
      }
    });
  });

countryStatsDetailed = stats;

  await rtdb.ref("countryStatsDetailed").set(stats);
}

/* ============================
   UNIVERSALER PARSER FÜR WETTSCHEINE
============================ */
function parseBetInput(text) {
  const lines = text
    .split("\n")
    .map(l => l.trim())
    .filter(l => l.length > 0);

  let sport = "";
  let team1 = "";
  let team2 = "";
  let tipp = "";
  let quoteEinzel = "";
  let quoteGesamt = "";
  let einsatz = "";
  let gewinn = "";

  /* ============================
     SPORTART erkennen
  ============================= */
  const sportMatch = lines.find(l =>
    l.match(/\b(Fußball|Basketball|Tennis|Eishockey|Handball)\b/i)
  );
  if (sportMatch) {
    sport = sportMatch.match(/\b(Fußball|Basketball|Tennis|Eishockey|Handball)\b/i)[1];
  }

  /* ============================
     TEAMS erkennen
     Fall A: "Team1" / "Team2" untereinander
  ============================= */
  for (let i = 0; i < lines.length - 1; i++) {
    if (
      lines[i].length > 2 &&
      lines[i + 1].length > 2 &&
      !lines[i].match(/quote|EUR|€|WETT|Einsatz|Gewinn|Optionen|Viertel/i) &&
      !lines[i].match(/^\d/)
    ) {
      team1 = lines[i];
      team2 = lines[i + 1];
      break;
    }
  }

  /* ============================
     TEAMS erkennen
     Fall B: "Monaco v Olympiacos"
  ============================= */
  const vsLine = lines.find(l => l.match(/(.+)\s+v\s+(.+)/i));
  if (vsLine) {
    const m = vsLine.match(/(.+)\s+v\s+(.+)/i);
    team1 = m[1].trim();
    team2 = m[2].trim();
  }

  /* ============================
     TIPP erkennen
     Fall A: Fußball
  ============================= */
  const tippA = lines.find(l =>
    l.match(/1X2|Über|Unter|Handicap|Halbzeit|S1|S2/i)
  );
  if (tippA) tipp = tippA;

  /* ============================
     TIPP erkennen
     Fall B: Basketball / US-Sport
     Beispiel:
     "Weniger als 46.5"
     "1. Viertel - Gesamtzahl Punkte (2 Optionen)"
  ============================= */
  const tippB1 = lines.find(l => l.match(/mehr|weniger|über|unter/i));
  const tippB2 = lines.find(l => l.match(/viertel|punkte|optionen/i));

  if (tippB1 && tippB2) {
    tipp = `${tippB1} – ${tippB2}`;
  }

  /* ============================
     QUOTEN erkennen
     erste Zahl = Einzelquote
     zweite Zahl = Gesamtquote
  ============================= */
  const numbers = lines
    .map(l => l.replace(",", "."))
    .filter(l => l.match(/^\d+(\.\d+)?$/));

  if (numbers.length >= 1) quoteEinzel = numbers[0];
  if (numbers.length >= 2) quoteGesamt = numbers[1];

  /* ============================
     EINSATZ erkennen
     Beispiel: €2,50 oder 2.5 EUR
  ============================= */
  const einsatzLine = lines.find(l =>
    l.match(/€|EUR/i) && !l.match(/Gewinn/i)
  );
  if (einsatzLine) {
    einsatz = einsatzLine.replace(/[^\d.,]/g, "").replace(",", ".");
  }

  /* ============================
     GEWINN erkennen
     Beispiel: €4,42
  ============================= */
  const gewinnLine = lines.find(l =>
    l.match(/€|EUR/i) && l.match(/Gewinn/i)
  );
  if (gewinnLine) {
    gewinn = gewinnLine.replace(/[^\d.,]/g, "").replace(",", ".");
  }

  return {
    sport,
    team1,
    team2,
    tipp,
    quoteEinzel,
    quoteGesamt,
    einsatz,
    gewinn
  };
}
