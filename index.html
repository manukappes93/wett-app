<body>
  <h1>Spielpaarungen & Wett-Tipps analysieren</h1>

  <textarea id="textInput" placeholder="Hier deinen Text einfügen..."></textarea>

  <button id="readButton">Text einlesen</button>
  <button id="saveDay">Speichern</button>
   <button id="loadDay">Laden</button>
   <button id="deleteDay">Tag löschen</button>
  <button id="showStats">Statistik</button>
  <button id="btnCountryStats" class="stats-button">🌍 GesamtBilanz</button>

  <div style="margin-top:20px;">
    <label for="baseStake" style="font-size:18px; font-weight:bold;">Grundeinsatz pro Wette:</label>
    <input type="number" id="baseStake" step="0.01" style="font-size:18px; padding:6px; width:150px; margin-left:10px;">
  </div>

  <div id="dayTotalBox" style="padding:8px 12px; border-radius:6px; font-weight:bold; min-width:120px; text-align:center; font-size:18px; margin-bottom:20px; background:#ddd;">
    0.00 €
  </div>

  <div id="output"></div>
  <!-- Statistik -->
  <div id="statsOverlay">
    <div class="overlay-box">
      <h2>Statistik</h2>
      <p id="statCorrect">✔️ Richtig: 0</p>
      <p id="statWrong">❌ Falsch: 0</p>
      <p id="statNeutral">➖ Neutral: 0</p>
      <p id="statReset">⭯ Reset: 0</p>
      <button id="closeStats">Schließen</button>
    </div>
  </div>

  <!-- Laden -->
  <div id="loadOverlay">
    <div class="overlay-box">
      <h2>Gespeicherte Tage</h2>
      <select id="daySelect"></select>
      <button id="loadSelectedDay">Laden</button>
      <button id="closeLoad">Schließen</button>
    </div>
  </div>

  <!-- Löschen -->
  <div id="deleteOverlay">
    <div class="overlay-box">
      <h2>Tag löschen</h2>
      <select id="deleteSelect"></select>
      <button id="deleteSelectedDay">Löschen</button>
      <button id="closeDelete">Schließen</button>
    </div>
  </div>

  <!-- Speichern unter -->
  <div id="saveNameOverlay">
    <div class="overlay-box">
      <h2>Speichern unter …</h2>
      <input id="saveNameInput" type="text" style="width:90%; padding:10px; font-size:18px; margin-bottom:15px;" />
      <button id="confirmSaveName">Speichern</button>

<div id="countryStatsOverlay" class="overlay">
  <div class="overlay-content">
    <h2>Gesamtbilanz nach Ländern</h2>

<div class="search-close-row">
  <input 
    type="text" 
    id="countrySearch" 
    placeholder="Land suchen..." 
    class="search-input">

  <button id="closeCountryStats" class="close-button top-close">Schließen</button>
</div>

    <div id="countryStatsContent"></div>

    <button id="closeCountryStats" class="close-button">Schließen</button>
  </div>
</div>

<script>
/* ============================
   GRUNDVARIABLEN
============================ */
let currentEntries = [];
let isTimePickerOpen = false;
let countryStatsDetailed = {};


const output = document.getElementById("output");
const baseStakeInput = document.getElementById("baseStake");
const loadOverlay = document.getElementById("loadOverlay");
const deleteOverlay = document.getElementById("deleteOverlay");
const statsOverlay = document.getElementById("statsOverlay");

function today() {
  return new Date().toISOString().split("T")[0];
}

/* ============================
   GRUNDEINSATZ LADEN (RTDB)
============================ */
async function loadBaseStake() {
  const snap = await rtdb.ref("settings/baseStake").once("value");
  if (snap.exists()) baseStakeInput.value = snap.val();
}
loadBaseStake();

/* Grundeinsatz speichern */
baseStakeInput.oninput = async () => {
  await rtdb.ref("settings/baseStake").set(baseStakeInput.value);
   // WICHTIG: Nur rendern, wenn NICHT gerade eine Uhrzeit eingegeben wird
  if (!isTimePickerOpen) {
    renderEntries();
    }
};

/* ============================
   SORTIERUNG & COUNTDOWN
============================ */
function sortEntries() {
  currentEntries.sort((a, b) => (a.time || "") > (b.time || "") ? 1 : -1);
}

function updateCountdowns() {
  if (isTimePickerOpen) return;

  const now = new Date();

  currentEntries.forEach((entry, index) => {
    const cd = document.getElementById("countdown-" + index);
    if (!cd) return;

    if (!entry.time) {
      cd.textContent = "Keine Uhrzeit gesetzt";
      return;
    }

    const target = new Date(today() + "T" + entry.time + ":00");
    let diff = target - now;

    if (diff > 0) {
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      cd.textContent = `Start in ${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    } else {
      diff = Math.abs(diff);
      const minutes = Math.floor(diff / 60000);
      cd.textContent = minutes < 110 ? "im Gange" : "Beendet";
    }
  });
}

/* ============================
   TAGESBILANZ
============================ */
function updateDayTotal() {
  const stake = parseFloat(baseStakeInput.value || 0);
  let total = 0;

  currentEntries.forEach(entry => {
    entry.tips
      .filter(tip => tip.favorite)   // ⭐ nur Favoriten
      .forEach(tip => {
        const quote = parseFloat(tip.quote || 0);

        if (tip.color === "correct") {
          total += (quote * stake) - stake;
        } else if (tip.color === "wrong") {
          total -= stake;
        }
      });
  });

  const box = document.getElementById("dayTotalBox");
  box.textContent = total.toFixed(2) + " €";
  box.style.backgroundColor =
    total > 0 ? "#c8ffcc" : total < 0 ? "#ffcccc" : "#dddddd";
}

async function loadAllSavedDays() {
const snapshot = await rtdb.ref("days").get();
  return snapshot.val() || {};
}

async function calculateGlobalCountryStats() {
  const snapshot = await rtdb.ref("days").get();
  const days = snapshot.val() || {};

  const stats = {};

  for (const date in days) {
    const dayData = days[date];

    // WICHTIG: Deine Tipps liegen unter "entries"
    const entries = Object.values(dayData.entries || {});

    entries.forEach(entry => {
      if (!entry || !entry.tips) return;

      const country = entry.country || "Unbekannt";

      if (!stats[country]) stats[country] = {};

      entry.tips.forEach(tip => {
        if (!tip) return;

        const type = getTipType(tip);
        const quote = parseFloat(tip.quote || 0);
        const stake = parseFloat(baseStakeInput.value || 0);

        if (!stats[country][type]) {
          stats[country][type] = {
            correct: 0,
            wrong: 0,
            neutral: 0,
            reset: 0,
            profit: 0
          };
        }

        if (tip.color === "correct") {
          stats[country][type].correct++;
          stats[country][type].profit += (quote * stake) - stake;
        } else if (tip.color === "wrong") {
          stats[country][type].wrong++;
          stats[country][type].profit -= stake;
        } else if (tip.color === "neutral") {
          stats[country][type].neutral++;
        } else {
          stats[country][type].reset++;
        }
      });
    });
  }

  return stats;
}


/* ============================
   Gesamtbilanz
============================ */
function renderCountryStats(data) {
  const container = document.getElementById("countryStatsContent");
  container.innerHTML = "";

  for (const country in data) {
    const countryBox = document.createElement("div");
    countryBox.className = "country-box";

    let html = `<h3>${country}</h3>`;

   for (const type in data[country]) {
  const t = data[country][type];

  const profitClass = t.profit >= 0 ? "profit-positive" : "profit-negative";

  html += `
    <div class="tip-type-box">
      <strong>${type}</strong><br>
      ✔️ ${t.correct}
      ❌ ${t.wrong}
      ➖ ${t.neutral}
      ⭯ ${t.reset}<br>
      <strong class="${profitClass}">
        Profit: ${t.profit.toFixed(2)} €
      </strong>
    </div>
  `;
    }

    countryBox.innerHTML = html;
    container.appendChild(countryBox);
  }
}


/* ============================
   STATISTIK
============================ */
function updateStats() {
  let correct = 0, wrong = 0, neutral = 0, reset = 0;

  currentEntries.forEach(entry => {
    entry.tips
      .filter(tip => tip.favorite)   // ⭐ nur Favoriten
      .forEach(tip => {
        if (tip.color === "correct") correct++;
        else if (tip.color === "wrong") wrong++;
        else if (tip.color === "neutral") neutral++;
        else reset++;
      });
  });

  document.getElementById("statCorrect").textContent = "✔️ Richtig: " + correct;
  document.getElementById("statWrong").textContent = "❌ Falsch: " + wrong;
  document.getElementById("statNeutral").textContent = "➖ Neutral: " + neutral;
  document.getElementById("statReset").textContent = "⭯ Reset: " + reset;
}

/* ============================
   Hilfsfunktion für Tipp‑Art 
============================ */
function getTipType(tip) {
  if (tip.label.includes("HT")) return "HT";
  if (tip.label.includes("FT")) return "FT";
  if (tip.label.includes("Beide Teams")) return "BTTS";
  if (tip.label.includes("Genaues Ergebnis")) return "CorrectScore";
  return "Other";
}

/* ============================
   EINTRÄGE RENDERN
============================ */
function renderEntries() {
  sortEntries();
  output.innerHTML = "";

  currentEntries.forEach((entry, ei) => {
    const div = document.createElement("div");
    div.className = "entry";

    const totalBox = document.createElement("div");
    totalBox.style.cssText = "float:right; padding:6px 10px; border-radius:6px; background:#ddd; font-weight:bold;";
    totalBox.textContent = "0.00 €";
    div.appendChild(totalBox);

   const timeInput = document.createElement("input");
timeInput.type = "time";
timeInput.className = "time-input";
timeInput.value = entry.time || "";

// Countdown pausieren, sobald das Feld geöffnet wird
timeInput.addEventListener("focus", () => {
  isTimePickerOpen = true;
});

// Während der Eingabe KEIN Re-Render
timeInput.addEventListener("input", () => {
  isTimePickerOpen = true;
});

// Erst wenn das Feld verlassen wird → übernehmen + rendern
timeInput.addEventListener("blur", () => {
  const v = timeInput.value;

  if (v && v.length === 5) {
    entry.time = v;
  }

  isTimePickerOpen = false;
  sortEntries();
  renderEntries();
});

    div.appendChild(timeInput);

    const cd = document.createElement("div");
    cd.className = "countdown";
    cd.id = "countdown-" + ei;
    cd.textContent = "–";
    div.appendChild(cd);

const h2 = document.createElement("h2");
h2.innerHTML = `
  <span class="country-text">${entry.country || ""}</span>
  <span class="edit-country" data-id="${ei}">✏️</span>
`;
div.appendChild(h2);

    const p = document.createElement("p");
    p.innerHTML = "<strong>Spielpaarung:</strong> " + (entry.match || "");
    div.appendChild(p);

function updateTotal() {
  const stake = parseFloat(baseStakeInput.value || 0);
  let total = 0;

  // ⭐ Nur Favoriten auswerten
  entry.tips
    .filter(tip => tip.favorite)
    .forEach(tip => {
      const quote = parseFloat(tip.quote || 0);

      if (tip.color === "correct") {
        total += (quote * stake) - stake;
      } else if (tip.color === "wrong") {
        total -= stake;
      }
    });

  totalBox.textContent = total.toFixed(2) + " €";
  totalBox.style.backgroundColor =
    total > 0 ? "#c8ffcc" : total < 0 ? "#ffcccc" : "#ddd";
}

    entry.tips.forEach((tip, ti) => {
      const row = document.createElement("div");
      row.className = "tip-row";
      row.dataset.entryIndex = ei;
row.dataset.tipIndex = ti;

 const tipType = getTipType(tip);   // HT, FT, BTTS, CorrectScore, Other
const country = entry.country;

let ampelColor = "#ccc"; // Standard grau

if (countryStatsDetailed[country] && countryStatsDetailed[country][tipType]) {
  const profit = countryStatsDetailed[country][tipType].profit;
  if (profit > 0) ampelColor = "#4CAF50";      // Grün
  else if (profit < 0) ampelColor = "#F44336"; // Rot
}

      
row.innerHTML = `
  <span class="tip-ampel" style="background:${ampelColor};"></span>
  <button class="btn-fav" style="font-size:20px; background:none; border:none; cursor:pointer;">
    ${tip.favorite ? "⭐" : "☆"}
  </button>
  <span class="tip-label"><strong>${tip.label}:</strong> ${tip.value}</span>
  <input type="number" step="0.01" class="quote-input" style="font-size:18px; font-weight:bold;">
  <span class="profit-display"></span>
  <button class="btn-correct">✔️</button>
  <button class="btn-wrong">❌</button>
  <button class="btn-neutral">➖</button>
  <button class="btn-reset">⭯</button>
`;

      const quoteInput = row.querySelector(".quote-input");
      const profitDisplay = row.querySelector(".profit-display");
const favBtn = row.querySelector(".btn-fav");

favBtn.onclick = () => {
  tip.favorite = !tip.favorite;
  favBtn.textContent = tip.favorite ? "⭐" : "☆";
  row.style.border = tip.favorite ? "2px solid gold" : "1px solid #ccc";
  updateStats();
  updateAmpeln();
  updateDayTotal();
};


      quoteInput.value = tip.quote || "";

      function updateProfit() {
        const stake = parseFloat(baseStakeInput.value || 0);
        const quote = parseFloat(quoteInput.value || 0);

        if (tip.color === "reset") {
          profitDisplay.textContent = "–";
          profitDisplay.style.backgroundColor = "#fff";
          return;
        }

        if (tip.color === "neutral") {
          profitDisplay.textContent = "0.00 €";
          profitDisplay.style.backgroundColor = "#ddd";
          return;
        }

        if (tip.color === "wrong") {
          profitDisplay.textContent = "-" + stake.toFixed(2) + " €";
          profitDisplay.style.backgroundColor = "#ffcccc";
          return;
        }

        if (tip.color === "correct") {
          const profit = (quote * stake) - stake;
          profitDisplay.textContent = profit.toFixed(2) + " €";
          profitDisplay.style.backgroundColor = "#c8ffcc";
        }
      }

quoteInput.oninput = () => {
  tip.quote = quoteInput.value;
  updateProfit();
  updateTotal();
  updateDayTotal();
  updateStats();
  updateAmpeln();
  updateCountryStats();
  updateCountryStatsDetailed();
};

row.querySelector(".btn-correct").onclick = () => {
  tip.color = "correct";
  row.style.backgroundColor = "#c8ffcc";
  updateProfit();
  updateTotal();
  updateDayTotal();
  updateStats();
  updateAmpeln();
  updateCountryStats();
  updateCountryStatsDetailed();   // ⬅️ HIER NEU
};

row.querySelector(".btn-wrong").onclick = () => {
  tip.color = "wrong";
  row.style.backgroundColor = "#ffcccc";
  updateProfit();
  updateTotal();
  updateDayTotal();
  updateStats();
  updateAmpeln();
  updateCountryStats();
  updateCountryStatsDetailed();
};

row.querySelector(".btn-neutral").onclick = () => {
  tip.color = "neutral";
  row.style.backgroundColor = "#f0f0f0";
  updateProfit();
  updateTotal();
  updateDayTotal();
  updateStats();
  updateAmpeln();
  updateCountryStats();
  updateCountryStatsDetailed();
};

row.querySelector(".btn-reset").onclick = () => {
  tip.color = "reset";
  row.style.backgroundColor = "";
  tip.quote = "";
  quoteInput.value = "";
  profitDisplay.textContent = "";
  updateTotal();
  updateDayTotal();
  updateStats();
  updateAmpeln();
  updateCountryStats();
  updateCountryStatsDetailed();
};

      if (!tip.color) tip.color = "reset";
      updateProfit();
      div.appendChild(row);
    });

    updateTotal();
    output.appendChild(div);
  });

 updateCountdowns();
updateStats();
updateAmpeln();
updateDayTotal();
}

// ⭐ HIER Schritt 4 einfügen
document.addEventListener("click", function (e) {
  if (!e.target.classList.contains("edit-country")) return;

  const id = e.target.dataset.id;
  const entry = currentEntries[id];

  const span = e.target.previousElementSibling;
  const oldValue = span.textContent;

  const newValue = prompt("Neues Land eingeben:", oldValue);
  if (!newValue || newValue.trim() === "") return;

  span.textContent = newValue;
  entry.country = newValue;

  const today = document.getElementById("datePicker").value;
  if (today) {
    rtdb.ref(`days/${today}/entries/${id}/country`).set(newValue);
  }

  updateCountryStats();
  updateAmpeln();
  updateCountryStatsDetailed();
});

/* ============================
   TEXT EINLESEN
============================ */
document.getElementById("readButton").onclick = () => {
  const raw = document.getElementById("textInput").value.trim();
  currentEntries = [];

  if (!raw) {
    output.textContent = "Es wurde kein Text eingegeben.";
    updateDayTotal();
    updateAmpeln();
    return;
  }

  const blocks = raw.split(/[\=≠]{5,}/g).map(b => b.trim()).filter(b => b.length > 0);

  blocks.forEach(block => {
    const lines = block.split("\n").map(l => l.trim()).filter(l => l);

    let country = "", match = "", htTip = "", ftTip = "", correctScore = "", bothTeams = "";

    lines.forEach((line, idx) => {
      if (/°{3,}/.test(line)) {
        const prev = lines[idx - 1] || "";
        country = prev.replace(/▶/g, "").trim();
      }
    });

    lines.forEach(line => {
      if (line.includes("🆚")) match = line.replace(/▶/g, "").trim();

      if (/▶\s*[0-9Xx]\s*\/\s*[0-9Xx]/.test(line)) {
        const clean = line.replace(/▶/g, "").trim();
        const parts = clean.split("/");
        htTip = parts[0].trim();
        ftTip = parts[1].trim();
      }

      if (/Correct/i.test(line) && /(\d+[:;]\d+)/.test(line)) {
        correctScore = line.match(/(\d+[:;]\d+)/)[0].replace(";", ":");
      }

      if (/Both team yes/i.test(line)) bothTeams = "Ja";
    });

    const tips = [];
   if (htTip) tips.push({ label: "HT Tipp", value: htTip, quote: "", color: "reset", favorite: false });
if (ftTip) tips.push({ label: "FT Tipp", value: ftTip, quote: "", color: "reset", favorite: false });
if (correctScore) tips.push({ label: "Genaues Ergebnis", value: correctScore, quote: "", color: "reset", favorite: false });
if (bothTeams) tips.push({ label: "Beide Teams treffen", value: "Ja", quote: "", color: "reset", favorite: false });


    currentEntries.push({ country, match, tips, time: "" });
  });

  renderEntries();
  document.getElementById("textInput").value = "";
};

/* ============================
   SPEICHERN (RTDB)
============================ */
document.getElementById("saveDay").onclick = () => {
  if (!currentEntries.length) {
    alert("Keine Daten zum Speichern vorhanden.");
    return;
  }

  const input = document.getElementById("saveNameInput");
  input.value = today();
  document.getElementById("saveNameOverlay").style.display = "flex";
};

document.getElementById("cancelSaveName").onclick = () => {
  document.getElementById("saveNameOverlay").style.display = "none";
};

document.getElementById("confirmSaveName").onclick = async () => {
  const name = document.getElementById("saveNameInput").value.trim();
  if (!name) {
    alert("Bitte einen Namen eingeben.");
    return;
  }

  try {
    const ref = rtdb.ref("days/" + name);
    const snap = await ref.once("value");

    // Wenn der Tag existiert → Nachfrage
    if (snap.exists()) {
      const overwrite = confirm(
        "Für diesen Tag existieren bereits Daten.\nMöchtest du sie überschreiben?"
      );
      if (!overwrite) return;
    }

    // Speichern / Überschreiben
    await rtdb.ref("days/" + name).set({ entries: currentEntries });

alert("Gespeichert unter: " + name);

document.getElementById("saveNameOverlay").style.display = "none";
  } catch (e) {
    console.error(e);
    alert("Fehler beim Speichern.");
  }
};

   LADEN (RTDB)
============================ */
document.getElementById("loadDay").onclick = async () => {
  try {
    const snap = await rtdb.ref("days").once("value");
    const select = document.getElementById("daySelect");
    select.innerHTML = "";

    if (snap.exists()) {
      Object.keys(snap.val()).forEach(day => {
        const opt = document.createElement("option");
        opt.value = day;
        opt.textContent = day;
        select.appendChild(opt);
      });

      const days = Object.keys(snap.val() || {}).sort();
const lastDay = days[days.length - 1];

if (lastDay) {
  select.value = lastDay;
}
    }

    loadOverlay.style.display = "flex";
  } catch (e) {
    console.error(e);
    alert("Fehler beim Laden der Liste.");
  }
};

document.getElementById("closeLoad").onclick = () => {
  loadOverlay.style.display = "none";
};

document.getElementById("loadSelectedDay").onclick = async () => {
  const day = document.getElementById("daySelect").value;
  if (!day) return;

  try {
    const snap = await rtdb.ref("days/" + day).once("value");

    if (snap.exists()) {
      currentEntries = snap.val().entries || [];

      // ⭐ 1. Globale Stats laden
      countryStatsDetailed = await calculateGlobalCountryStats();

      // ⭐ 2. Einträge rendern
      renderEntries();

      // ⭐ 3. Ampeln aktualisieren
      updateAmpeln();

      // ⭐ 4. Tagesbilanz aktualisieren
      updateDayTotal();
    } else {
      alert("Keine Daten für diesen Tag gefunden.");
    }

    loadOverlay.style.display = "none";
  } catch (e) {
    console.error(e);
    alert("Fehler beim Laden.");
  }
};

/* ============================
   Detaillierte Länder‑Statistik‑Funktion
============================ */
async function updateCountryStatsDetailed() {
  const stake = parseFloat(baseStakeInput.value || 0);

  const stats = {};

  currentEntries.forEach(entry => {
    const country = entry.country || "Unbekannt";

    if (!stats[country]) stats[country] = {};

    entry.tips.forEach(tip => {
      const type = getTipType(tip);
      const quote = parseFloat(tip.quote || 0);

      if (!stats[country][type]) {
        stats[country][type] = {
          correct: 0,
          wrong: 0,
          neutral: 0,
          reset: 0,
          profit: 0
        };
      }

      if (tip.color === "correct") {
        stats[country][type].correct++;
        stats[country][type].profit += (quote * stake) - stake;
      } else if (tip.color === "wrong") {
        stats[country][type].wrong++;
        stats[country][type].profit -= stake;
      } else if (tip.color === "neutral") {
        stats[country][type].neutral++;
      } else {
        stats[country][type].reset++;
      }
    });
  });

countryStatsDetailed = stats;

  await rtdb.ref("countryStatsDetailed").set(stats);
}

function updateAmpeln() {
  document.querySelectorAll(".tip-row").forEach((row, index) => {
    const entryIndex = parseInt(row.dataset.entryIndex);
    const tipIndex = parseInt(row.dataset.tipIndex);

    const entry = currentEntries[entryIndex];
    const tip = entry.tips[tipIndex];

    const tipType = getTipType(tip);
    const country = entry.country;

    let color = "#ccc";

    if (countryStatsDetailed[country] && countryStatsDetailed[country][tipType]) {
      const profit = countryStatsDetailed[country][tipType].profit;
      if (profit > 0) color = "#4CAF50";
      else if (profit < 0) color = "#F44336";
    }

    const ampel = row.querySelector(".tip-ampel");
    if (ampel) ampel.style.background = color;
  });
}
